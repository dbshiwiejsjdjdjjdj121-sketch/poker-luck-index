name: SEO Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  seo-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SEO report
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: npm run seo:report

      - name: Build SEO action plan
        run: npm run seo:plan

      - name: Upload SEO report artifact
        uses: actions/upload-artifact@v4
        with:
          name: seo-report
          path: reports/seo/
          if-no-files-found: error

      - name: Publish workflow summary
        run: cat reports/seo/latest.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create SEO action issue
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");

            const reportDir = path.join(process.env.GITHUB_WORKSPACE, "reports", "seo");
            const actionPlan = JSON.parse(fs.readFileSync(path.join(reportDir, "action-plan.json"), "utf8"));
            const issueBody = fs.readFileSync(path.join(reportDir, "issue-body.md"), "utf8");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labelName = "seo";

            const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const existingIssue = existingIssues.find(
              (issue) => !issue.pull_request && issue.title === actionPlan.issueTitle,
            );

            const existingLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner,
              repo,
              per_page: 100,
            });

            if (!existingLabels.some((label) => label.name === labelName)) {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: labelName,
                color: "0e8a16",
                description: "Automated SEO action plans",
              });
            }

            if (existingIssue) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existingIssue.number,
                body: issueBody,
                labels: [labelName],
              });
              core.notice(`Updated SEO issue #${existingIssue.number}`);
            } else {
              const result = await github.rest.issues.create({
                owner,
                repo,
                title: actionPlan.issueTitle,
                body: issueBody,
                labels: [labelName],
              });
              core.notice(`Created SEO issue #${result.data.number}`);
            }

            const staleSeoIssues = existingIssues.filter((issue) => {
              if (issue.pull_request || issue.title === actionPlan.issueTitle) {
                return false;
              }

              return issue.labels.some((label) =>
                typeof label === "string" ? label === labelName : label.name === labelName,
              );
            });

            for (const staleIssue of staleSeoIssues) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: staleIssue.number,
                state: "closed",
              });
              core.notice(`Closed stale SEO issue #${staleIssue.number}`);
            }
